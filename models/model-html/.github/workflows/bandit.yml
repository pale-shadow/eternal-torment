name: Bandit Security Check
on:
  pull_request:
  push:
    branches:
      - main #dev, release, etc.
  release:
    types:
      - created

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 #get fuller history
      - name: Run Bandit
        uses: jpetrucciani/bandit-check@master
        with:
          bandit_flags: '--configfile .bandit -x _build'
