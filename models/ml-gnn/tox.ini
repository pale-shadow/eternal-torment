[tox]
envlist = flake8,py38,py39,py310,py311
sitepackages = False

[gh-actions]
python = 
  3.11: py311

[pytest]
filterwarnings =
    ignore::DeprecationWarning

[testenv]
setenv   =
    # for python3 venv
    PYTHONPATH = {toxinidir}{:}{toxinidir}/src
    # for nix-shell testing
    # PYTHONPATH = {env:PYTHONPATH}{:}{toxinidir}{:}{toxinidir}/gcp_tagging
deps =
    pytest
    pytest_testconfig
    flake8
    safety
    bandit
whitelist_externals =
    python3
    coverage
commands =
    bandit --recursive . --configfile .bandit
    safety check -r src/collection/requirements.txt
    safety check -r tests/requirements.txt
    python3 -m pip -q install -r{toxinidir}/tests/requirements.txt
    python3 -m pip -q install -r{toxinidir}/src/collection/requirements.txt
    coverage run --rcfile={toxinidir}/.coveragerc -m pytest -vv {toxinidir}/tests
    coverage report src/collection/collection.py

[testenv:flake8]
deps =
    flake8
    flake8-bugbear
    flake8-docstrings>=1.3.1
    flake8-typing-imports>=1.1
    pep8-naming
whitelist_externals =
    python3
    flake8
commands =
    python3 -m pip -q install -r{toxinidir}/tests/requirements.txt
    python3 -m pip -q install -r{toxinidir}/src/collection/requirements.txt
    flake8 src/collection tests/ setup.py

[flake8]
# Ignore some flake8-docstrings errors
# N817 camelcase 'xml.etree.ElementTree' imported as acronym 'ET'
ignore = D203, W503, E203, E501, N813, N817
exclude =
    .tox,
    .git,
    __pycache__,
    docs,
    _build,
    dist,
    *.pyc,
    *.egg-info,
    .cache,
    .eggs
max-complexity = 10
